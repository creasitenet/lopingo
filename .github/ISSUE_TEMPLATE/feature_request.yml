name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check [ROADMAP.md](https://github.com/creasitenet/lopingo/blob/main/ROADMAP.md) first — your idea may already be listed.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Lopingo does not support well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional — other approaches or existing tools you looked at.
