name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Lopingo.slnx

      - name: Build
        run: dotnet build Lopingo.slnx --no-restore -c Release

      - name: Test
        run: dotnet test Lopingo.Tests/Lopingo.Tests.csproj --no-build -c Release --verbosity normal
