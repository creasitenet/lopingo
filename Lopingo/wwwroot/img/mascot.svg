<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Lopingo penguin">
  <defs>
    <linearGradient id="coat" x1="36" y1="14" x2="96" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#94A3B8"/>
      <stop offset=".45" stop-color="#64748B"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="belly" x1="50" y1="64" x2="78" y2="108" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="64" cy="114" rx="28" ry="5" fill="#0F172A" opacity="0.18"/>

  <!-- Flippers (behind body tone) -->
  <ellipse cx="36" cy="78" rx="8" ry="18" fill="#64748B" transform="rotate(-18 36 78)"/>
  <ellipse cx="92" cy="78" rx="8" ry="18" fill="#64748B" transform="rotate(18 92 78)"/>

  <!-- Body — slate mid-tones so it pops on dark theme -->
  <ellipse cx="64" cy="78" rx="30" ry="34" fill="url(#coat)"/>
  <!-- Belly -->
  <ellipse cx="64" cy="86" rx="18" ry="22" fill="url(#belly)"/>
  <!-- Subtle belly edge -->
  <ellipse cx="64" cy="86" rx="18" ry="22" fill="none" stroke="#CBD5E1" stroke-width="1" opacity=".5"/>

  <!-- Head -->
  <circle cx="64" cy="42" r="24" fill="url(#coat)"/>
  <!-- Face -->
  <ellipse cx="64" cy="46" rx="14" ry="12" fill="#F8FAFC"/>

  <!-- Eyes -->
  <circle cx="56" cy="42" r="4" fill="#0F172A"/>
  <circle cx="72" cy="42" r="4" fill="#0F172A"/>
  <circle cx="57.2" cy="40.8" r="1.3" fill="#FFFFFF"/>
  <circle cx="73.2" cy="40.8" r="1.3" fill="#FFFFFF"/>

  <!-- Beak -->
  <path d="M58 50 L64 58 L70 50 Z" fill="#FBBF24"/>

  <!-- Feet -->
  <ellipse cx="52" cy="110" rx="9" ry="4" fill="#FBBF24"/>
  <ellipse cx="76" cy="110" rx="9" ry="4" fill="#FBBF24"/>

  <!-- Ping arcs — sky, distinct from coat -->
  <path d="M90 28 Q104 36 104 52" fill="none" stroke="#38BDF8" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M98 18 Q118 30 118 56" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
