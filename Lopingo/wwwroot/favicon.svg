<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Lopingo">
  <defs>
    <linearGradient id="coat" x1="18" y1="10" x2="48" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#64748B"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <!-- Soft badge -->
  <circle cx="32" cy="32" r="30" fill="#1E293B"/>
  <!-- Body — mid slate, readable on dark UI -->
  <ellipse cx="32" cy="38" rx="16" ry="18" fill="url(#coat)"/>
  <!-- Belly -->
  <ellipse cx="32" cy="42" rx="10" ry="12" fill="#F8FAFC"/>
  <!-- Head -->
  <circle cx="32" cy="22" r="12" fill="url(#coat)"/>
  <!-- Face patch -->
  <ellipse cx="32" cy="24" rx="7" ry="6" fill="#F8FAFC"/>
  <!-- Eyes -->
  <circle cx="28" cy="22" r="2.2" fill="#0F172A"/>
  <circle cx="36" cy="22" r="2.2" fill="#0F172A"/>
  <circle cx="28.6" cy="21.4" r="0.7" fill="#FFFFFF"/>
  <circle cx="36.6" cy="21.4" r="0.7" fill="#FFFFFF"/>
  <!-- Beak -->
  <path d="M29 26 L32 30 L35 26 Z" fill="#FBBF24"/>
  <!-- Feet -->
  <ellipse cx="26" cy="54" rx="4" ry="2" fill="#FBBF24"/>
  <ellipse cx="38" cy="54" rx="4" ry="2" fill="#FBBF24"/>
  <!-- Ping arcs -->
  <path d="M44 18 Q50 22 50 30" fill="none" stroke="#38BDF8" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M48 14 Q56 20 56 32" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
